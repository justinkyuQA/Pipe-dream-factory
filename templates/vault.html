<!DOCTYPE html>
<html>
<head>
<title>Vault</title>
<style>
body{background:#111;color:#eee;font-family:Arial,sans-serif;margin:20px;}
a{color:#7cc7ff;}
h1,h2{color:#eee;}
</style>
</head>
<body>

<h1>Pipe Dreams Vault</h1>
<a href="/">Home</a>
<hr>

{% for category, files in vault.items() %}
<h2>{{ category }}</h2>
<ul>
{% for file in files %}
<li><a href="/note/{{ category }}/{{ file }}">{{ file }}</a></li>
{% endfor %}
</ul>
{% endfor %}

</body>
</html>
